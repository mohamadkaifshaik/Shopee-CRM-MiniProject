<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Employees Page Shopee CRM</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loader">
      <div class="loader-bar"></div>
      <div class="loader-text">Loading…</div>
    </div>

    <div
      class="modal fade"
      id="empModal"
      tabindex="-1"
      aria-labelledby="modalTitle"
      aria-hidden="true"
    >
      <div
        class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable"
      >
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Details</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body" id="modalBody" style="padding: 1.4rem"></div>
          <div class="modal-footer">
            <button class="btn-ghost btn-sm" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <header>
      <nav class="navbar navbar-expand-lg crm-navbar" data-bs-theme="light">
        <div class="container-xl">
          <a class="navbar-brand" href="Dashboard.html">
            <span class=""><span></span></span>Shopee CRM
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#nav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto gap-1">
              <li class="nav-item">
                <a class="nav-link" href="Dashboard.html">Dashboard</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="Employees.html">Employees</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="Assessment.html">Assessment</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="Profile.html">Profile</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="page-wrap">
      <div class="container-xl">
        <nav class="crm-bc" aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="Dashboard.html">Home</a></li>
            <li class="breadcrumb-item active">Employees</li>
          </ol>
        </nav>

        <div
          class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-4 fu"
        >
          <div class="page-hd" style="margin: 0">
            <h1>Employee <em>Management</em></h1>
            <p><span id="empCount">—</span> employees on record.</p>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <input
              id="search"
              class="crm-input"
              placeholder="Search name, dept, role…"
              style="min-width: 200px; max-width: 260px"
            />
            <select id="deptFilter" class="crm-select">
              <option value="">All Departments</option>
              <option>Sales</option>
              <option>Marketing</option>
              <option>Engineering</option>
              <option>HR</option>
              <option>Finance</option>
            </select>
          </div>
        </div>

        <section aria-label="Employee list">
          <div class="card-box fu d2">
            <div class="crm-table-wrap">
              <table class="crm-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Role</th>
                    <th>Clients</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="tbody">
                  <tr>
                    <td
                      colspan="7"
                      style="
                        padding: 3rem;
                        text-align: center;
                        font-family: &quot;DM Mono&quot;, monospace;
                        font-size: 0.72rem;
                        color: var(--ink-4);
                      "
                    >
                      Loading…
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>

        <section aria-label="Department summary" style="margin-top: 2.5rem">
          <div class="sec-title fu d3">Departments</div>
          <div class="row g-3" id="deptCards"></div>
        </section>
      </div>
    </main>

    <footer>
      <div class="container-xl d-flex flex-wrap justify-content-between gap-2">
        <p>© 2026 <a href="#">Shopee CRM</a></p>
        <p>HTML · CSS · Bootstrap · jQuery · JS</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/employees.js"></script>
  </body>
</html>
